name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  IMAGE_NAME: vimukthirandunu/production-waitlist-api

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run tests
        run: |
          pytest tests/ -v

  build-and-push:
    runs-on: ubuntu-latest
    needs: test
    # only runs if test job passed
    # only runs on push to main, not on PRs
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    outputs:
      image_tag: ${{ steps.set_tag.outputs.image_tag }}
      # this output passes the SHA tag to the deploy jobs below

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set image tag
        id: set_tag
        run: echo "image_tag=${{ github.sha }}" >> $GITHUB_OUTPUT
        # github.sha is the commit SHA that triggered this run
        # every push to main gets a unique tag — this is how rollback works

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          push: true
          tags: ${{ env.IMAGE_NAME }}:${{ github.sha }}
          # tagged with the exact commit SHA, not latest
          # this image is permanently addressable and pullable forever

  deploy-staging:
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: staging

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to staging
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.STAGING_EC2_IP }}
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ~/production-waitlist-api
            git pull origin main

            echo "IMAGE_TAG=${{ needs.build-and-push.outputs.image_tag }}" > .env
            echo "POSTGRES_USER=${{ secrets.POSTGRES_USER }}" >> .env
            echo "POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}" >> .env
            echo "POSTGRES_DB=${{ secrets.POSTGRES_DB }}" >> .env
            echo "API_KEY=${{ secrets.API_KEY }}" >> .env
            # writes the .env file on the server fresh every deploy
            # secrets never live in the repo, they come from GitHub secrets at deploy time

            docker compose pull
            docker compose up -d --remove-orphans

  health-check-staging:
    runs-on: ubuntu-latest
    needs: deploy-staging
    environment: staging

    steps:
      - name: Wait for startup
        run: sleep 15

      - name: Health check
        run: |
          curl -f http://${{ secrets.STAGING_EC2_IP }}/health
        # -f means fail with non-zero exit code if response is not 200
        # if this fails the pipeline stops here, production never gets touched

  deploy-production:
    runs-on: ubuntu-latest
    needs: health-check-staging
    environment: production
    # environment: production triggers the manual approval gate
    # pipeline pauses here until you approve in GitHub

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to production
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PRODUCTION_EC2_IP }}
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ~/production-waitlist-api
            git pull origin main

            #overwrites the default nginx.conf with the production version before docker compose starts.
            cp ~/production-waitlist-api/nginx/nginx.prod.conf ~/production-waitlist-api/nginx/nginx.conf
            
            # store current image tag before deploying — needed for rollback
            CURRENT_TAG=$(grep IMAGE_TAG .env | cut -d '=' -f2)
            echo $CURRENT_TAG > ~/previous_tag.txt

            echo "IMAGE_TAG=${{ needs.build-and-push.outputs.image_tag }}" > .env
            echo "POSTGRES_USER=${{ secrets.POSTGRES_USER }}" >> .env
            echo "POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}" >> .env
            echo "POSTGRES_DB=${{ secrets.POSTGRES_DB }}" >> .env
            echo "API_KEY=${{ secrets.API_KEY }}" >> .env

            docker compose pull
            docker compose up -d --remove-orphans

      - name: Rollback on failure
        if: failure()
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PRODUCTION_EC2_IP }}
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            PREVIOUS_TAG=$(cat ~/previous_tag.txt)
            cd ~/production-waitlist-api
            echo "IMAGE_TAG=$PREVIOUS_TAG" > .env
            echo "POSTGRES_USER=${{ secrets.POSTGRES_USER }}" >> .env
            echo "POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}" >> .env
            echo "POSTGRES_DB=${{ secrets.POSTGRES_DB }}" >> .env
            echo "API_KEY=${{ secrets.API_KEY }}" >> .env
            docker compose up -d --remove-orphans
            # pulls the previous SHA image and redeploys it
            # production goes back to last known good state

  health-check-production:
    runs-on: ubuntu-latest
    needs: deploy-production

    steps:
      - name: Wait for startup
        run: sleep 15

      - name: Health check
        run: |
          curl -f https://demo.radianceits.com/health