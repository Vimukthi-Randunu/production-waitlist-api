upstream fastapi_app {
    server fastapi:8000;
}
# "fastapi" is the Docker Compose service name.
# Docker's internal DNS resolves it to the FastAPI container's IP automatically.
# This upstream block gives that target a name Nginx can reference below.

server {
    listen 80;
    server_name _;
    # listen 80 — accept HTTP traffic.
    # server_name _ — underscore means "match any hostname."
    # For local dev and staging this is fine.
    # Production will replace this with the real domain.

    location / {
        proxy_pass http://fastapi_app;
        # Forward all requests to the upstream we defined above.

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # These headers pass the original request information to FastAPI.
        # Without them FastAPI sees Nginx as the client, not the real user.
        # X-Real-IP and X-Forwarded-For carry the actual client IP.
        # X-Forwarded-Proto tells FastAPI whether the original request was HTTP or HTTPS.
    }
}